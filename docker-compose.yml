services:
  postgres:
    image: mirror.gcr.io/library/postgres:15
    container_name: dating_bot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ZXsaQW25ZXsaQW252525
      POSTGRES_DB: dating_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    command: postgres -c listen_addresses='*'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dating_bot_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: ZXsaQW25
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
